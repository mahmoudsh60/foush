<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
  <meta charset="UTF-8">
  <title>LevelUP POS</title>
  <style>
    body { font-family: Tahoma, sans-serif; background: #f4f7f6; margin: 0; }
    .header { background: #2c3e50; color: white; padding: 15px; display: flex; justify-content: space-between; align-items: center;}
    .container { display: flex; height: 90vh; padding: 10px; gap: 15px; }
    .rooms { flex: 2; display: flex; flex-wrap: wrap; gap: 10px; align-content: flex-start; overflow-y: auto; }
    .cafe { flex: 1; background: white; padding: 15px; border-radius: 8px; display: flex; flex-direction: column; }
    .card { background: white; padding: 15px; border-radius: 8px; text-align: center; width: 180px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); cursor: pointer; border-top: 5px solid #2ecc71; }
    .card.busy { border-top-color: #e74c3c; }
    .cafe-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 10px; overflow-y: auto; }
    .cafe-item { background: #ecf0f1; padding: 10px; text-align: center; border-radius: 5px; cursor: pointer; border: 1px solid #ccc;}
    .invoice { margin-top: auto; border-top: 2px solid #ccc; padding-top: 10px; }
    .error-msg { color: red; width: 100%; text-align: center; font-weight: bold; }
  </style>
</head>
<body>

  <div class="header">
    <h2>LevelUP POS - محاكي الكاشير</h2>
    <div style="font-size: 14px; text-align: left;">
      <span id="sub-status" style="color: #f1c40f;">جاري فحص الاشتراك...</span>
    </div>
  </div>

  <div class="container">
    <div class="rooms" id="rooms-container">
      <h3>جاري تحميل الغرف من الشيت...</h3>
    </div>

    <div class="cafe">
      <h3>الكافيتريا</h3>
      <div class="cafe-grid" id="cafe-container">
        </div>
      
      <div class="invoice">
        <h4>الغرفة: <span id="selected-room">لم يتم التحديد</span></h4>
        <ul id="invoice-items" style="list-style: none; padding: 0;"></ul>
        <h3>الإجمالي: <span id="total">0</span> ج.م</h3>
      </div>
    </div>
  </div>

  <script>
    // جلب الإعدادات (تاريخ الاشتراك)
    google.script.run.withSuccessHandler(function(res) {
      if(res.error) { document.getElementById('sub-status').innerText = res.error; return; }
      let subDate = new Date(res.subExpiry).toLocaleDateString('ar-EG');
      document.getElementById('sub-status').innerText = "الاشتراك صالح حتى: " + subDate;
    }).getSettingsData();

    // جلب الغرف
    google.script.run.withSuccessHandler(function(res) {
      const container = document.getElementById('rooms-container');
      if (res.error) {
        container.innerHTML = `<div class="error-msg">⚠️ خطأ في الغرف: ${res.error}</div>`;
        return;
      }
      container.innerHTML = '';
      res.data.forEach(room => {
        let isBusy = room.status === 'مشغول';
        container.innerHTML += `
          <div class="card ${isBusy ? 'busy' : ''}" onclick="selectRoom('${room.roomName}')">
            <h3>${room.roomName}</h3>
            <p>${room.device}</p>
            <p style="font-weight:bold; color: ${isBusy ? '#e74c3c' : '#2ecc71'}">${room.status || 'متاح'}</p>
          </div>
        `;
      });
    }).getRoomsData();

    // جلب الكافيتريا
    google.script.run.withSuccessHandler(function(res) {
      const container = document.getElementById('cafe-container');
      if (res.error) {
        container.innerHTML = `<div class="error-msg">⚠️ خطأ: ${res.error}</div>`;
        return;
      }
      container.innerHTML = '';
      res.data.forEach(item => {
        container.innerHTML += `
          <div class="cafe-item" onclick="addOrder('${item.itemName}', ${item.sellingPrice})">
            ${item.itemName} <br> <strong>${item.sellingPrice} ج</strong>
          </div>
        `;
      });
    }).getCafeteriaItems();

    let currentTotal = 0;
    function selectRoom(name) {
      document.getElementById('selected-room').innerText = name;
    }

    function addOrder(name, price) {
      if(document.getElementById('selected-room').innerText === 'لم يتم التحديد') {
        alert('اختر غرفة أولاً لربط الطلب بها!'); return;
      }
      document.getElementById('invoice-items').innerHTML += `<li>${name} - ${price} ج</li>`;
      currentTotal += price;
      document.getElementById('total').innerText = currentTotal;
    }
  </script>
</body>
</html>
