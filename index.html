<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
  <meta charset="UTF-8">
  <title>Foush POS System</title>
  <style>
    body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f4f7f6; margin: 0; padding: 0; }
    .header { background: #2c3e50; color: white; padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; }
    .container { display: flex; height: calc(100vh - 60px); }
    .rooms-section { flex: 2; padding: 20px; overflow-y: auto; display: flex; flex-wrap: wrap; gap: 15px; align-content: flex-start; }
    .cafe-section { flex: 1; background: #fff; border-right: 2px solid #ddd; padding: 20px; display: flex; flex-direction: column; }
    .room-card { background: white; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); width: 200px; padding: 15px; text-align: center; border-top: 5px solid #2ecc71; cursor: pointer; transition: 0.3s; }
    .room-card:hover { transform: translateY(-5px); }
    .room-card.busy { border-top-color: #e74c3c; }
    .btn { background: #3498db; color: white; border: none; padding: 10px 15px; border-radius: 5px; cursor: pointer; margin-top: 10px; width: 100%; }
    .btn:hover { background: #2980b9; }
    
    /* Cafeteria Grid */
    .cafe-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; margin-top: 15px; overflow-y: auto; }
    .cafe-card { background: #ecf0f1; padding: 10px; text-align: center; border-radius: 5px; cursor: pointer; border: 1px solid #bdc3c7; }
    .cafe-card:hover { background: #d0d3d4; }
    .invoice { margin-top: auto; padding-top: 15px; border-top: 2px dashed #7f8c8d; }
  </style>
</head>
<body>

  <div class="header">
    <h2>LevelUP - Foush POS</h2>
    <div>
      <span id="shift-info">الشيفت الحالي: محمود</span> | 
      <button onclick="alert('تقفيل اليومية سيتم برمجته لاحقاً')">تقفيل اليومية</button>
    </div>
  </div>

  <div class="container">
    <div class="rooms-section" id="rooms-container">
      <h3 style="width: 100%;">جاري تحميل الغرف...</h3>
    </div>

    <div class="cafe-section">
      <h3>الكافيتريا والمطعم</h3>
      <input type="text" placeholder="ابحث عن منتج..." style="padding: 8px; width: 95%;">
      <div class="cafe-grid" id="cafe-container">
        </div>
      
      <div class="invoice">
        <h4>فاتورة الغرفة المحددة: <span id="selected-room-name">لا يوجد</span></h4>
        <ul id="invoice-items" style="list-style: none; padding: 0;">
          <li style="color: gray; font-size: 14px;">اختر غرفة ثم اضغط على المنتجات لإضافتها</li>
        </ul>
        <h3>الإجمالي: <span id="total-amount">0</span> ج.م</h3>
        <button class="btn" style="background:#27ae60;">تأكيد الطلب</button>
      </div>
    </div>
  </div>

  <script>
    // تحميل البيانات من سيرفر جوجل
    google.script.run.withSuccessHandler(renderRooms).getRoomsData();
    google.script.run.withSuccessHandler(renderCafe).getCafeteriaItems();

    function renderRooms(rooms) {
      const container = document.getElementById('rooms-container');
      container.innerHTML = '';
      rooms.forEach(room => {
        let isBusy = room.status === 'مشغول';
        container.innerHTML += `
          <div class="room-card ${isBusy ? 'busy' : ''}" onclick="selectRoom('${room.roomName}')">
            <h3>${room.roomName}</h3>
            <p style="color: #7f8c8d;">${room.device}</p>
            <p><strong>${room.status}</strong></p>
            ${isBusy ? '<button class="btn" style="background:#e74c3c;">تقفيل الغرفة</button>' : '<button class="btn">فتح الجلسة</button>'}
          </div>
        `;
      });
    }

    function renderCafe(items) {
      const container = document.getElementById('cafe-container');
      container.innerHTML = '';
      items.forEach(item => {
        container.innerHTML += `
          <div class="cafe-card" onclick="addToInvoice('${item.itemName}', ${item.sellingPrice})">
            <strong>${item.itemName}</strong><br>
            <span style="color: #2c3e50;">${item.sellingPrice} ج</span>
          </div>
        `;
      });
    }

    function selectRoom(roomName) {
      document.getElementById('selected-room-name').innerText = roomName;
    }

    let invoiceTotal = 0;
    function addToInvoice(itemName, price) {
      if(document.getElementById('selected-room-name').innerText === 'لا يوجد') {
        alert('الرجاء تحديد غرفة أولاً لربط الطلب بها');
        return;
      }
      const invoiceList = document.getElementById('invoice-items');
      invoiceList.innerHTML += `<li style="display:flex; justify-content:space-between; margin-bottom:5px;"><span>${itemName}</span> <span>${price} ج</span></li>`;
      invoiceTotal += price;
      document.getElementById('total-amount').innerText = invoiceTotal;
    }
  </script>
</body>
</html>
