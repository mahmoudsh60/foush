<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
  <meta charset="UTF-8">
  <title>Foush POS System</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&display=swap');
    
    :root {
      --bg-color: #0b0f19; --panel-bg: #151b2b; --text-main: #f8fafc;
      --accent: #00d2ff; --green: #00e676; --red: #ff1744; --orange: #ff9100;
    }
    body { font-family: 'Tajawal', sans-serif; background: var(--bg-color); color: var(--text-main); margin: 0; overflow: hidden; }
    
    /* Login Screen (موجود بس هيختفي أوتوماتيك) */
    #login-screen { display: flex; height: 100vh; justify-content: center; align-items: center; background: radial-gradient(circle, #151b2b 0%, #0b0f19 100%); position: absolute; width: 100%; z-index: 999;}
    .login-box { background: rgba(21, 27, 43, 0.95); padding: 40px; border-radius: 20px; text-align: center; border: 1px solid rgba(0, 210, 255, 0.3); }
    .login-box h1 { color: var(--accent); margin-bottom: 10px; font-weight: 900;}

    /* Main Layout */
    #pos-screen { display: none; height: 100vh; flex-direction: column; }
    .header { background: var(--panel-bg); padding: 15px 30px; display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid var(--accent); }
    .header h2 { margin: 0; color: var(--accent); font-weight: 900; }
    .main-grid { display: grid; grid-template-columns: 340px 1fr; height: calc(100vh - 75px); gap: 20px; padding: 20px; box-sizing: border-box; }
    
    /* Sidebar */
    .sidebar { background: var(--panel-bg); border-radius: 15px; padding: 20px; display: flex; flex-direction: column; gap: 15px; border: 1px solid #1e293b; overflow-y: auto;}
    .sidebar h3 { margin: 0 0 10px 0; color: var(--orange); border-bottom: 2px solid #1e293b; padding-bottom: 8px;}
    .cafe-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .cafe-btn { background: #1e293b; color: white; border: 1px solid #334155; padding: 12px; border-radius: 10px; cursor: pointer; text-align: center; font-weight: bold;}
    .cafe-btn:hover { background: var(--accent); color: #0b0f19; }
    
    /* Invoice */
    .invoice { margin-top: auto; background: #0b0f19; padding: 20px; border-radius: 12px; border: 1px solid var(--accent); }
    #invoice-items { list-style: none; padding: 0; margin: 0 0 15px 0; font-size: 14px; max-height: 150px; overflow-y: auto;}
    
    /* Rooms */
    .rooms-area { display: flex; flex-wrap: wrap; gap: 20px; align-content: flex-start; overflow-y: auto; padding-right: 10px;}
    .room-card { background: var(--panel-bg); width: 240px; padding: 25px; border-radius: 15px; border: 2px solid #1e293b; display: flex; flex-direction: column; align-items: center; position: relative;}
    .room-card.available { border-color: var(--green); }
    .room-card.busy { border-color: var(--red); }
    .room-name { font-size: 26px; font-weight: 900; margin-bottom: 5px;}
    .device-badge { background: #1e293b; padding: 4px 15px; border-radius: 20px; font-size: 12px; margin-bottom: 20px; color: var(--accent); }
    
    .timer { font-size: 34px; font-family: monospace; color: var(--orange); font-weight: bold; margin: 15px 0; display: none; }
    .room-card.busy .timer { display: block; }
    .room-card.busy .price-info { display: block; background: #0b0f19; padding: 8px 15px; border-radius: 8px; width: 80%; text-align: center; margin-bottom: 15px;}
    .price-info { display: none; }

    .control-btn { width: 100%; padding: 12px; border-radius: 10px; border: none; font-weight: bold; font-size: 15px; cursor: pointer; margin-top: 8px; font-family: 'Tajawal'; }
    .btn-start { background: rgba(0, 230, 118, 0.1); color: var(--green); border: 1px solid var(--green); }
    .btn-stop { background: rgba(255, 23, 68, 0.1); color: var(--red); border: 1px solid var(--red); }
    .btn-toggle { background: #1e293b; color: white; display: none; border: 1px solid #334155;}
    .room-card.busy .btn-toggle { display: block; }
  </style>
</head>
<body>

  <div id="login-screen">
    <div class="login-box">
      <h1>FOUSH</h1>
      <h3 style="color:var(--orange)">جاري الدخول لوضع التجربة...</h3>
    </div>
  </div>

  <div id="pos-screen">
    <div class="header">
      <h2>FOUSH POS</h2>
      <div>
        <span style="color: #cbd5e1; font-weight: bold; background: #1e293b; padding: 8px 15px; border-radius: 8px;">👤 مدير النظام (وضع التجربة)</span>
      </div>
    </div>

    <div class="main-grid">
      <div class="sidebar">
        <div style="flex-grow: 1; overflow-y: auto;">
          <h3>🍔 المطعم والكافيه</h3>
          <div class="cafe-grid" id="cafe-container"></div>
        </div>

        <div class="invoice">
          <h4 style="color:var(--green); margin-top:0;">🧾 فاتورة: <span id="selected-room" style="color: white;">حدد غرفة..</span></h4>
          <ul id="invoice-items"></ul>
          <h3 style="margin: 0; color: white; display: flex; justify-content: space-between; border-top: 1px dashed #334155; padding-top: 15px;">
            <span>الإجمالي:</span>
            <span style="color: var(--green); font-size: 24px;"><span id="total">0</span> ج</span>
          </h3>
        </div>
      </div>

      <div class="rooms-area" id="rooms-container"></div>
    </div>
  </div>

  <script>
    let roomsData = [];
    let cafeData = [];
    let activeSessions = {}; 

    // تخطي اللوجين أوتوماتيك أول ما الصفحة تفتح
    window.onload = function() {
      setTimeout(() => {
        document.getElementById('login-screen').style.display = "none";
        document.getElementById('pos-screen').style.display = "flex";
        loadData();
      }, 500); // نص ثانية انيميشن
    };

  function loadData() {
      // استدعاء الغرف
      google.script.run
        .withSuccessHandler(res => { 
          if(res.success) { roomsData = res.data; renderRooms(); } 
          else { document.getElementById('rooms-container').innerHTML = `<h3 style="color:var(--red); width:100%; text-align:center;">خطأ في الشيت: ${res.error}</h3>`; }
        })
        .withFailureHandler(err => {
          document.getElementById('rooms-container').innerHTML = `<h3 style="color:var(--red); width:100%; text-align:center;">خطأ في سيرفر جوجل: ${err.message}</h3>`;
        })
        .getRoomsData();
      
      // استدعاء الكافيتريا
      google.script.run.withSuccessHandler(res => { 
        if(res.success) { cafeData = res.data; renderCafe(); } 
      }).getCafeteriaItems();
      
      // استدعاء الحجوزات
      google.script.run.withSuccessHandler(res => { 
        if(res.success) renderQueue(res.data); 
      }).getQueueData();
    }

    function renderCafe() {
      const c = document.getElementById('cafe-container');
      c.innerHTML = '';
      cafeData.forEach(item => {
        c.innerHTML += `<div class="cafe-btn" onclick="addOrder('${item.itemName}', ${item.price})">${item.itemName}<br><b style="color:var(--green)">${item.price} ج</b></div>`;
      });
    }

    function renderRooms() {
      const container = document.getElementById('rooms-container');
      container.innerHTML = '';
      roomsData.forEach(room => {
        let isBusy = room.status === 'مشغول';
        let mode = activeSessions[room.roomName]?.mode || 'Single';
        
        container.innerHTML += `
          <div class="room-card ${isBusy ? 'busy' : 'available'}" onclick="selectRoom('${room.roomName}')">
            <div class="room-name">${room.roomName}</div>
            <div class="device-badge">${room.device}</div>
            
            <div class="timer" id="timer-${room.roomName}">00:00:00</div>
            <div class="price-info">الوضع: <strong style="color:white;">${mode}</strong> | <span id="cost-${room.roomName}" style="color:var(--green); font-weight:bold; font-size:16px;">0</span> ج</div>
            
            <button class="control-btn btn-toggle" onclick="toggleMode(event, '${room.roomName}')">🔁 تبديل الوضع</button>
            
            ${!isBusy ? 
              `<button class="control-btn btn-start" onclick="startRoom(event, '${room.roomName}', '${room.device}')">▶ فتح الجلسة</button>` : 
              `<button class="control-btn btn-stop" onclick="stopRoom(event, '${room.roomName}', '${room.device}')">■ تقفيل الفاتورة</button>`
            }
          </div>
        `;
      });
    }

    setInterval(updateTimers, 1000);

    function updateTimers() {
      for (let roomName in activeSessions) {
        let session = activeSessions[roomName];
        let now = Math.floor(Date.now() / 1000);
        let diff = now - session.startTime;
        
        let hours = Math.floor(diff / 3600);
        let mins = Math.floor((diff % 3600) / 60);
        let secs = diff % 60;
        
        document.getElementById(`timer-${roomName}`).innerText = 
          `${String(hours).padStart(2, '0')}:${String(mins).padStart(2, '0')}:${String(secs).padStart(2, '0')}`;
          
        let currentCost = (diff / 3600) * session.currentPrice;
        document.getElementById(`cost-${roomName}`).innerText = Math.floor(session.accrued + currentCost);
      }
    }

    function startRoom(e, roomName, device) {
      e.stopPropagation();
      let room = roomsData.find(r => r.roomName === roomName);
      room.status = 'مشغول';
      
      activeSessions[roomName] = {
        startTime: Math.floor(Date.now() / 1000),
        mode: 'Single',
        currentPrice: room.single || 0,
        accrued: 0,
        cafeTotal: 0
      };
      
      renderRooms();
      selectRoom(roomName);
      google.script.run.updateRoomFirebase(roomName, 'مشغول', device);
    }

    function toggleMode(e, roomName) {
      e.stopPropagation();
      let session = activeSessions[roomName];
      let room = roomsData.find(r => r.roomName === roomName);
      
      let now = Math.floor(Date.now() / 1000);
      let diff = now - session.startTime;
      let costSoFar = (diff / 3600) * session.currentPrice;
      
      session.accrued += costSoFar;
      session.startTime = now;
      
      if(session.mode === 'Single') {
        session.mode = 'Multi';
        session.currentPrice = room.multi || 0;
      } else {
        session.mode = 'Single';
        session.currentPrice = room.single || 0;
      }
      renderRooms();
    }

    function stopRoom(e, roomName, device) {
      e.stopPropagation();
      let totalPlayCost = document.getElementById(`cost-${roomName}`).innerText;
      let cafeCost = activeSessions[roomName].cafeTotal;
      let finalBill = parseInt(totalPlayCost) + cafeCost;
      
      alert(`🧾 فاتورة [ ${roomName} ]\n\n🎮 حساب اللعب: ${totalPlayCost} ج\n🍔 حساب الكافيه: ${cafeCost} ج\n----------------\n💰 الإجمالي المطلوب: ${finalBill} ج`);
      
      let room = roomsData.find(r => r.roomName === roomName);
      room.status = 'متاح';
      delete activeSessions[roomName];
      
      renderRooms();
      document.getElementById('selected-room').innerText = "حدد غرفة..";
      document.getElementById('invoice-items').innerHTML = '';
      document.getElementById('total').innerText = '0';
      google.script.run.updateRoomFirebase(roomName, 'متاح', device);
    }

    function selectRoom(name) {
      document.getElementById('selected-room').innerText = name;
      let session = activeSessions[name];
      document.getElementById('total').innerText = session ? session.cafeTotal : '0';
    }

    function addOrder(name, price) {
      let roomName = document.getElementById('selected-room').innerText;
      if(!activeSessions[roomName]) { alert('⚠️ يجب تشغيل الغرفة أولاً لطلب الكافيتريا!'); return; }
      
      document.getElementById('invoice-items').innerHTML += `<li>+ ${name} <span style="color:var(--accent); float:left;">${price} ج</span></li>`;
      activeSessions[roomName].cafeTotal += price;
      document.getElementById('total').innerText = activeSessions[roomName].cafeTotal;
    }
  </script>
</body>
</html>
